<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" width="520" height="160">
  <defs>
    <!-- Brick red gradient -->
    <linearGradient id="brickGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c0392b"/>
      <stop offset="100%" style="stop-color:#922b21"/>
    </linearGradient>

    <!-- Dark brick shadow -->
    <linearGradient id="brickShad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7b241c;stop-opacity:1"/>
    </linearGradient>

    <!-- Mortar highlight -->
    <linearGradient id="mortarGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f0ece8"/>
      <stop offset="100%" style="stop-color:#d5cfc8"/>
    </linearGradient>

    <!-- Icon box background -->
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>

    <!-- Drop shadow filter -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>

    <!-- Subtle glow on icon -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── ICON BLOCK ────────────────────────────────── -->
  <!-- Outer rounded square -->
  <rect x="8" y="8" width="144" height="144" rx="18" ry="18" fill="url(#boxGrad)" filter="url(#dropShadow)"/>

  <!-- Thin red accent border top -->
  <rect x="8" y="8" width="144" height="4" rx="2" fill="#c0392b"/>

  <!-- ── BRICK PATTERN (3 rows) ─────────────────── -->

  <!-- Row 1 — 2 full bricks -->
  <!-- Brick 1,1 -->
  <rect x="26" y="30" width="50" height="22" rx="3" fill="url(#brickGrad)"/>
  <rect x="26" y="30" width="50" height="7" rx="2" fill="#e74c3c" opacity="0.5"/>
  <rect x="26" y="49" width="50" height="3" rx="1" fill="#7b241c" opacity="0.6"/>

  <!-- Brick 1,2 -->
  <rect x="84" y="30" width="50" height="22" rx="3" fill="url(#brickGrad)"/>
  <rect x="84" y="30" width="50" height="7" rx="2" fill="#e74c3c" opacity="0.5"/>
  <rect x="84" y="49" width="50" height="3" rx="1" fill="#7b241c" opacity="0.6"/>

  <!-- Mortar between row 1 bricks (horizontal) -->
  <rect x="26" y="52" width="108" height="6" rx="1" fill="url(#mortarGrad)" opacity="0.6"/>
  <!-- Mortar gap between bricks (vertical) -->
  <rect x="76" y="30" width="8" height="22" rx="1" fill="url(#mortarGrad)" opacity="0.5"/>

  <!-- Row 2 — offset (half brick + full + half) -->
  <!-- Half brick left -->
  <rect x="26" y="58" width="23" height="22" rx="3" fill="url(#brickShad)"/>
  <rect x="26" y="58" width="23" height="6" rx="2" fill="#e74c3c" opacity="0.4"/>

  <!-- Full brick middle -->
  <rect x="57" y="58" width="50" height="22" rx="3" fill="url(#brickGrad)"/>
  <rect x="57" y="58" width="50" height="6" rx="2" fill="#e74c3c" opacity="0.5"/>

  <!-- Half brick right -->
  <rect x="115" y="58" width="19" height="22" rx="3" fill="url(#brickShad)"/>
  <rect x="115" y="58" width="19" height="6" rx="2" fill="#e74c3c" opacity="0.4"/>

  <!-- Mortar between row 2 bricks -->
  <rect x="26" y="80" width="108" height="6" rx="1" fill="url(#mortarGrad)" opacity="0.6"/>
  <rect x="49" y="58" width="8" height="22" rx="1" fill="url(#mortarGrad)" opacity="0.5"/>
  <rect x="107" y="58" width="8" height="22" rx="1" fill="url(#mortarGrad)" opacity="0.5"/>

  <!-- Row 3 — 2 full bricks (same as row 1) -->
  <!-- Brick 3,1 -->
  <rect x="26" y="86" width="50" height="22" rx="3" fill="url(#brickGrad)"/>
  <rect x="26" y="86" width="50" height="7" rx="2" fill="#e74c3c" opacity="0.5"/>
  <rect x="26" y="105" width="50" height="3" rx="1" fill="#7b241c" opacity="0.6"/>

  <!-- Brick 3,2 -->
  <rect x="84" y="86" width="50" height="22" rx="3" fill="url(#brickGrad)"/>
  <rect x="84" y="86" width="50" height="7" rx="2" fill="#e74c3c" opacity="0.5"/>
  <rect x="84" y="105" width="50" height="3" rx="1" fill="#7b241c" opacity="0.6"/>

  <!-- Mortar vertical gap row 3 -->
  <rect x="76" y="86" width="8" height="22" rx="1" fill="url(#mortarGrad)" opacity="0.5"/>

  <!-- Row 4 — partial (bottom peek, adds depth) -->
  <rect x="26" y="115" width="50" height="14" rx="3" fill="url(#brickShad)" opacity="0.7"/>
  <rect x="84" y="115" width="50" height="14" rx="3" fill="url(#brickShad)" opacity="0.7"/>
  <rect x="76" y="115" width="8" height="14" rx="1" fill="url(#mortarGrad)" opacity="0.4"/>

  <!-- Bottom mortar fade -->
  <rect x="26" y="126" width="108" height="3" rx="1" fill="url(#mortarGrad)" opacity="0.3"/>

  <!-- Corner accent dots (industrial feel) -->
  <circle cx="24" cy="16" r="2.5" fill="#c0392b" opacity="0.6"/>
  <circle cx="136" cy="16" r="2.5" fill="#c0392b" opacity="0.6"/>
  <circle cx="24" cy="144" r="2.5" fill="#c0392b" opacity="0.6"/>
  <circle cx="136" cy="144" r="2.5" fill="#c0392b" opacity="0.6"/>

  <!-- ── WORDMARK ────────────────────────────────── -->
  <!-- "BRICK" -->
  <text
    x="174"
    y="90"
    font-family="'Georgia', 'Times New Roman', serif"
    font-size="58"
    font-weight="700"
    letter-spacing="-1"
    fill="#1a1a1a"
    dominant-baseline="middle">BRICK</text>

  <!-- Underline accent below BRICK -->
  <rect x="174" y="115" width="210" height="4" rx="2" fill="#c0392b"/>

  <!-- "MANAGEMENT" -->
  <text
    x="176"
    y="140"
    font-family="'Georgia', 'Times New Roman', serif"
    font-size="15.5"
    font-weight="400"
    letter-spacing="7"
    fill="#888888"
    dominant-baseline="middle">MANAGEMENT</text>

</svg>
